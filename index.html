<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VendaGest - Sistema de Vendas & Financeiro</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Folha de Estilos -->
    <link rel="stylesheet" href="styles.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Menu -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="logo-icon">
                    <i data-lucide="shopping-bag"></i>
                </div>
                <span class="brand-name">Venda<span>Gest</span></span>
            </div>
            
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-target="dashboard">
                    <i data-lucide="layout-dashboard"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-target="clientes">
                    <i data-lucide="users"></i>
                    <span>Clientes</span>
                </a>
                <a href="#" class="nav-item" data-target="fornecedores">
                    <i data-lucide="truck"></i>
                    <span>Fornecedores</span>
                </a>
                <a href="#" class="nav-item" data-target="novo-pedido">
                    <i data-lucide="shopping-cart"></i>
                    <span>Novo Pedido</span>
                </a>
                <a href="#" class="nav-item" data-target="pedidos-kanban">
                    <i data-lucide="kanban-square"></i>
                    <span>Kanban Pedidos</span>
                </a>
                <a href="#" class="nav-item" data-target="financeiro">
                    <i data-lucide="dollar-sign"></i>
                    <span>Financeiro</span>
                </a>
                <a href="#" class="nav-item" data-target="cliente-catalogo" style="display: none;">
                    <i data-lucide="shopping-bag"></i>
                    <span>Fazer Pedido</span>
                </a>
                <a href="#" class="nav-item" data-target="cliente-pedidos" style="display: none;">
                    <i data-lucide="clock"></i>
                    <span>Acompanhar Pedidos</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="avatar" id="user-avatar">V</div>
                    <div class="user-info">
                        <span class="user-name" id="user-display-name">Carregando...</span>
                        <span class="user-role" id="user-display-role">Vendedor</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content Wrapper -->
        <div class="main-wrapper">
            <!-- Header -->
            <header class="header">
                <div class="header-left">
                    <button class="menu-toggle" id="menu-toggle">
                        <i data-lucide="menu"></i>
                    </button>
                    <h1 class="page-title" id="page-title">Dashboard</h1>
                </div>
                
                <div class="header-right">
                    <!-- Perfil Selector -->
                    <div class="profile-selector-container">
                        <label for="profile-select" class="selector-label">
                            <i data-lucide="shield-check"></i>
                            <span>Perfil:</span>
                        </label>
                        <select id="profile-select" class="profile-select">
                            <option value="vendedor">Vendedor (Visitas)</option>
                            <option value="producao">Produção & Logística</option>
                            <option value="gestor">Gestor (Acesso Total)</option>
                            <option value="cliente">Portal do Cliente</option>
                        </select>
                    </div>

                    <!-- Cliente Activo Selector (só visível no modo cliente) -->
                    <div class="profile-selector-container" id="cliente-session-container" style="display: none; margin-left: 8px;">
                        <label for="cliente-session-select" class="selector-label">
                            <i data-lucide="user"></i>
                            <span>Cliente Ativo:</span>
                        </label>
                        <select id="cliente-session-select" class="profile-select">
                            <!-- Preenchido via app.js com os clientes cadastrados -->
                        </select>
                    </div>
                </div>
            </header>

            <!-- Main Dynamic Content Container -->
            <main class="content-container" id="app-content">
                <!-- Conteúdo renderizado dinamicamente pelo app.js -->
            </main>
        </div>
    </div>

    <!-- Modal: Adicionar/Editar Cliente -->
    <div class="modal-backdrop" id="modal-cliente">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-cliente-title">Novo Cliente</h3>
                <button class="modal-close" onclick="closeModal('modal-cliente')">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="form-cliente">
                    <input type="hidden" id="cliente-id">
                    <div class="form-group">
                        <label for="cliente-nome">Nome Fantasia / Nome do Cliente *</label>
                        <input type="text" id="cliente-nome" required placeholder="Ex: Padaria Bella Vista">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="cliente-razao">Razão Social</label>
                            <input type="text" id="cliente-razao" placeholder="Ex: Bella Vista LTDA">
                        </div>
                        <div class="form-group">
                            <label for="cliente-documento">CPF / CNPJ</label>
                            <input type="text" id="cliente-documento" placeholder="00.000.000/0001-00">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="cliente-telefone">Telefone / WhatsApp *</label>
                            <input type="text" id="cliente-telefone" required placeholder="(11) 99999-9999">
                        </div>
                        <div class="form-group">
                            <label for="cliente-segmento">Segmento *</label>
                            <select id="cliente-segmento" required>
                                <option value="Cafeteria">Cafeteria</option>
                                <option value="Padaria">Padaria</option>
                                <option value="Restaurante">Restaurante</option>
                                <option value="Lanchonete">Lanchonete</option>
                                <option value="Outro">Outro</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="cliente-endereco">Endereço Completo</label>
                        <input type="text" id="cliente-endereco" placeholder="Rua, Número, Bairro, Cidade">
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" onclick="closeModal('modal-cliente')">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Salvar Cliente</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal: Adicionar/Editar Fornecedor -->
    <div class="modal-backdrop" id="modal-fornecedor">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-fornecedor-title">Novo Fornecedor</h3>
                <button class="modal-close" onclick="closeModal('modal-fornecedor')">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="form-fornecedor">
                    <input type="hidden" id="fornecedor-id">
                    <div class="form-group">
                        <label for="fornecedor-nome">Nome do Fornecedor / Empresa *</label>
                        <input type="text" id="fornecedor-nome" required placeholder="Ex: Distribuidora de Grãos Express">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="fornecedor-contato">Contato (Nome)</label>
                            <input type="text" id="fornecedor-contato" placeholder="Ex: João da Distribuidora">
                        </div>
                        <div class="form-group">
                            <label for="fornecedor-telefone">Telefone / WhatsApp *</label>
                            <input type="text" id="fornecedor-telefone" required placeholder="(11) 98888-8888">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="fornecedor-insumos">Insumos / Produtos Fornecidos *</label>
                        <input type="text" id="fornecedor-insumos" required placeholder="Ex: Café em grão, Embalagens, Leite">
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" onclick="closeModal('modal-fornecedor')">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Salvar Fornecedor</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal: Registrar Compra / Despesa -->
    <div class="modal-backdrop" id="modal-despesa">
        <div class="modal">
            <div class="modal-header">
                <h3>Lançar Nova Despesa</h3>
                <button class="modal-close" onclick="closeModal('modal-despesa')">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="form-despesa">
                    <div class="form-group">
                        <label for="despesa-descricao">Descrição / Finalidade *</label>
                        <input type="text" id="despesa-descricao" required placeholder="Ex: Compra de Sacarias de Café">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="despesa-valor">Valor (R$) *</label>
                            <input type="number" id="despesa-valor" step="0.01" required placeholder="0.00">
                        </div>
                        <div class="form-group">
                            <label for="despesa-fornecedor">Fornecedor Vinculado (Opcional)</label>
                            <select id="despesa-fornecedor">
                                <option value="">Nenhum</option>
                                <!-- Preenchido por JS -->
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="despesa-data">Data do Lançamento</label>
                        <input type="date" id="despesa-data" required>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" onclick="closeModal('modal-despesa')">Cancelar</button>
                        <button type="submit" class="btn btn-danger">Confirmar Saída</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal: Detalhes do Pedido -->
    <div class="modal-backdrop" id="modal-pedido">
        <div class="modal">
            <div class="modal-header">
                <h3>Detalhes do Pedido <span id="detalhe-pedido-id" style="color: var(--color-primary);">#0000</span></h3>
                <button class="modal-close" onclick="closeModal('modal-pedido')">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div class="modal-body" id="modal-pedido-body">
                <!-- Preenchido via app.js -->
            </div>
        </div>
    </div>

    <!-- Script Principal -->
    <script src="app.js"></script>
</body>
</html>
